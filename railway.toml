[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# Web service — FastAPI app
[deploy]
startCommand = "alembic upgrade head && python scripts/seed.py && gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 60 --graceful-timeout 30"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
