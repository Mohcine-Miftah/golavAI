version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: golav_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: golav
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golav_secret}
      POSTGRES_DB: golav
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golav -d golav"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: golav_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golav_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed.py &&
             gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000 --timeout 60 --graceful-timeout 30
             --access-logfile - --error-logfile -"
    volumes:
      - ./exports:/app/exports

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golav_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -Q ai,outbox,maintenance -c 4

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golav_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler

volumes:
  pgdata:
  redisdata:
